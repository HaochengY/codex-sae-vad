data:
  cached_dir: null
  batch_size: 32
  num_workers: 4
  split_seed: 42

ckpt:
  save_dir: "checkpoints/"
  load_path: null

optim:
  lr: 5e-5
  eta_min_factor: 0.1
  warmup_ratio: 0.03

train:
  max_epochs: 20

loss:
  l1_coef: 5

sae_model:
  architecture: standard
  d_in: 2048
  d_sae: 65536
  activation_fn_str: relu
  activation_fn_kwargs: {}
  apply_b_dec_to_input: false
  finetuning_scaling_factor: false
  normalize_activations: none
  dtype: bfloat16
  device: cpu

  model_name: qwen2.5-vl-3b-video
  hook_name: model.language_model.layers.12
  hook_layer: 12

  hook_head_index: null
  context_size: 1400
  prepend_bos: false
  dataset_path: null
  dataset_trust_remote_code: false
  sae_lens_training_version: null
  model_from_pretrained_kwargs: {}

